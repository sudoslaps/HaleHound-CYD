; =============================================================================
; platformio.ini  —  HaleHound-CYD  E32R40T 4.0" Port
; =============================================================================

[platformio]
default_envs = esp32-e32r40t

; -----------------------------------------------------------------------------
; Primary environment: lcdwiki E32R40T 4.0"
; -----------------------------------------------------------------------------
[env:esp32-e32r40t]
platform   = espressif32
board      = esp32dev
framework  = arduino

; Large app partition — firmware is big (many modules, icons, fonts)
board_build.partitions = huge_app.csv

; Build flags
build_flags =
    -DCYD_E32R40T                   ; selects E32R40T pin/display config
    -DUSER_SETUP_LOADED             ; tell TFT_eSPI to use our User_Setup.h
    -DCORE_DEBUG_LEVEL=0            ; suppress ESP-IDF verbose log
    -DBOARD_HAS_PSRAM=0
    -O2

; Upload
upload_speed   = 921600
monitor_speed  = 115200

; Libraries — identical to original except touch driver
lib_deps =
    bodmer/TFT_eSPI                 @ ^2.5.43
    bblanchon/ArduinoJson           @ ^7.0.0
    mikalhart/TinyGPSPlus           @ ^1.0.3
    plerup/EspSoftwareSerial        @ ^8.2.0
    sui77/rc-switch                 @ ^2.6.4
    kosme/arduinoFFT                @ ^2.0.2
    nRF24/RF24                      @ ^1.4.9
    ;
    ; TOUCH DRIVER CHANGE:
    ; Original used a custom CYD28_TouchscreenR (bit-banged).
    ; E32R40T shares HSPI, so we use the standard XPT2046 library.
    paulstoffregen/XPT2046_Touchscreen
    ;
    greiman/SdFat                   @ ^2.1.0
    SmartRC-CC1101-Driver-Lib       @ ^2.5.7

; -----------------------------------------------------------------------------
; Legacy 2.8" CYD environment kept for reference
; -----------------------------------------------------------------------------
[env:esp32-cyd]
platform   = espressif32
board      = esp32dev
framework  = arduino
board_build.partitions = huge_app.csv
build_flags =
    -DCYD_28
    -DUSER_SETUP_LOADED
    -DCORE_DEBUG_LEVEL=0
    -O2
upload_speed   = 921600
monitor_speed  = 115200
lib_deps =
    bodmer/TFT_eSPI                 @ ^2.5.43
    bblanchon/ArduinoJson           @ ^7.0.0
    mikalhart/TinyGPSPlus           @ ^1.0.3
    plerup/EspSoftwareSerial        @ ^8.2.0
    sui77/rc-switch                 @ ^2.6.4
    kosme/arduinoFFT                @ ^2.0.2
    nRF24/RF24                      @ ^1.4.9
    paulstoffregen/XPT2046_Touchscreen
    greiman/SdFat                   @ ^2.1.0
    SmartRC-CC1101-Driver-Lib       @ ^2.5.7
